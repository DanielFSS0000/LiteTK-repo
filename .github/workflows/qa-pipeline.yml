name: LiteTk QA Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  qa-async-kafka:
    name: Dia 5 - QA Async Kafka
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    env:
      APP_DIR: Semana_3/dia-4-kafka-docker
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            Semana_3/dia-4-kafka-docker/backend/package-lock.json
            Semana_3/dia-4-kafka-docker/frontend/package-lock.json
            Semana_3/dia-4-kafka-docker/tests/package-lock.json

      - name: Start Kafka infrastructure
        run: |
          docker compose -f "$APP_DIR/docker-compose.yml" up -d
          docker compose -f "$APP_DIR/docker-compose.yml" ps

      - name: Install backend dependencies
        working-directory: Semana_3/dia-4-kafka-docker/backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: Semana_3/dia-4-kafka-docker/frontend
        run: npm ci

      - name: Build frontend
        working-directory: Semana_3/dia-4-kafka-docker/frontend
        run: npm run build

      - name: Install Playwright dependencies
        working-directory: Semana_3/dia-4-kafka-docker/tests
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Reset lab database
        run: |
          printf '{\n  "transactions": {}\n}\n' > "$APP_DIR/backend/db.json"

      - name: Start backend and worker
        working-directory: Semana_3/dia-4-kafka-docker/backend
        run: |
          npm run start-server > server.log 2>&1 &
          echo $! > server.pid
          npm run start-worker > worker.log 2>&1 &
          echo $! > worker.pid

          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:3000/health > /dev/null; then
              echo "Backend healthcheck OK"
              exit 0
            fi
            echo "Waiting for backend healthcheck... attempt $attempt"
            sleep 2
          done

          echo "Backend did not become healthy"
          cat server.log
          exit 1

      - name: Run Playwright QA suite
        working-directory: Semana_3/dia-4-kafka-docker/tests
        env:
          ALLURE_ENDPOINT: ${{ secrets.ALLURE_ENDPOINT }}
          ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN }}
          ALLURE_PROJECT_ID: ${{ secrets.ALLURE_PROJECT_ID }}
        run: |
          if [[ -n "$ALLURE_ENDPOINT" && -n "$ALLURE_TOKEN" && -n "$ALLURE_PROJECT_ID" ]]; then
            curl -fsSL https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64 -o allurectl
            chmod +x allurectl
            ./allurectl watch -- npx playwright test
          else
            echo "Allure TestOps secrets not configured. Running Playwright without Allure upload."
            npx playwright test
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Semana_3/dia-4-kafka-docker/tests/playwright-report
          if-no-files-found: ignore

      - name: Upload service logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-logs
          path: |
            Semana_3/dia-4-kafka-docker/backend/server.log
            Semana_3/dia-4-kafka-docker/backend/worker.log
          if-no-files-found: ignore

      - name: Stop Docker services
        if: always()
        run: docker compose -f "$APP_DIR/docker-compose.yml" down
